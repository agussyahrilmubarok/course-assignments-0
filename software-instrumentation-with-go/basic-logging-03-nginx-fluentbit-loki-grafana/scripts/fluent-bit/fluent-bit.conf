[SERVICE]
    flush       1
    log_level   debug

[INPUT]
    Name forward
    Listen 0.0.0.0
    port 24224

[OUTPUT]
    name        stdout
    match       *

[OUTPUT]
    name        loki
    match       nginx
    host        loki
    port        3100
    labels      app=nginx-service
    label_map_path /fluent-bit/etc/map.json
    remove_keys container_id,container_name,source
    drop_single_key true
    line_format key_value