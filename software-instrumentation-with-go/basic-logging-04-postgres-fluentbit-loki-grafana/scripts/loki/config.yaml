# Disable authentication (for local or development use only)
auth_enabled: false

# Server configuration
server:
  # HTTP port where Loki's API and UI are exposed
  http_listen_port: 3100
  # Maximum gRPC message size (20 MB in bytes)
  grpc_server_max_recv_msg_size: 20971520  

# Limits configuration to control ingestion and data rate
limits_config:
  # Maximum ingestion rate in MB per second
  ingestion_rate_mb: 10
  # Maximum burst ingestion rate in MB
  ingestion_burst_size_mb: 20
  # Per-stream ingestion rate limit
  per_stream_rate_limit: 10MB
  # Per-stream burst limit
  per_stream_rate_limit_burst: 20MB
  # Disable structured metadata (set to true if you use structured logging)
  allow_structured_metadata: false 

# Common configuration for Loki
common:
  # Base path for Loki data
  path_prefix: /loki
  # Storage configuration (using local filesystem in this example)
  storage:
    filesystem:
      # Directory for log chunks
      chunks_directory: /loki/chunks
      # Directory for rule files
      rules_directory: /loki/rules
  # Number of replicas for data (1 means no replication)
  replication_factor: 1
  # Ring configuration for coordination between components
  ring:
    kvstore:
      # Use in-memory key-value store (suitable for single-node setup)
      store: inmemory

# Table manager handles retention and compaction
table_manager:
  # Enable automatic deletion of old data
  retention_deletes_enabled: true
  # Keep logs for 7 days
  retention_period: 7d

# Schema configuration defines how data is stored and indexed
schema_config:
  configs:
    - from: 2025-01-01        # Start date for this schema configuration
      store: tsdb              # Use TSDB (Time Series Database) storage
      object_store: filesystem # Store data on local filesystem
      schema: v13              # Schema version
      index:
        prefix: index_         # Prefix for index files
        period: 24h            # Create a new index every 24 hours